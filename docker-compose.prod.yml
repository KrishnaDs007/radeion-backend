services:
  api:
    image: ${RADEION_API_IMAGE:-radeion-backend:latest}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const port = process.env.PORT || 3000; fetch(`http://127.0.0.1:${port}/health`).then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1));",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
