name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  validate:
    name: Validate Backend
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/radeion_ci
      DIRECT_URL: postgresql://ci:ci@localhost:5432/radeion_ci
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_PUBLISHABLE_KEY: ci-publishable-key
      SUPABASE_SECRET_KEY: ci-secret-key
      DATABRICKS_HOST: https://example.cloud.databricks.com
      DATABRICKS_TOKEN: ci-databricks-token
      DATABRICKS_HTTP_PATH: /sql/1.0/warehouses/ci-warehouse
      CACHE_DRIVER: memory
      EMAIL_DRIVER: disabled

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint:check

      - name: Validate docs
        run: npm run docs:validate

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: E2E Test
        run: npm run test:e2e

      - name: Audit dependencies
        run: npm audit --audit-level=moderate
